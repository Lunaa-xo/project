<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" id="pokemonName" placeholder="Enter pokemen name">
    <button onclick="fetchPokemon()">Fetch Pokemon</button><br>
    <img src="" alt="Pokemon Sprite" id="pokemonSprite" style="display: none;">
    <p id="pokemonWeight"></p>

    <script>
        // http://pokeapi.co/api/v2/pokemon/

        let fetchButton = document.getElementById('fetchPokemon');

        async function fetchPokemon() {
            try {
                let pokemonName = document.getElementById('pokemonName').value;
                let response = await fetch(`http://pokeapi.co/api/v2/pokemon/${pokemonName}`);

                console.log(response);

                if (!response.ok) {
                    throw new Error('Could not fetch data from the API ');
                }
                else {
                    let data = await response.json();
                    console.log(data);

                    let pokemonSprite = document.getElementById('pokemonSprite');
                     let pokemonSprite2 = document.getElementById('pokemonSprite');
                    pokemonSprite.style.display = 'block';
                    pokemonSprite2.style.display = 'block';
                    pokemonSprite.src = data.sprites.front_default;
                     pokemonSprite.src = data.sprites.back_shiny;

                    let pokemonWeight = document.getElementById('pokemonWeight');
                    pokemonWeight.textContent = `Weight: ${data.weight}`;
                }


            } catch (error) {
                console.error('Error:', error);
            }
        };
    </script>
</body>

</html>
